<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-url" content="http://localhost:3000">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Pengumuman PKKMB</title>
    <style type="text/tailwindcss">
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="min-h-screen font-sans">

    <!-- Header -->
    <header class="relative overflow-hidden py-12 px-6 text-center">
        <div class="absolute"></div>
        <div class="relative z-10 fade-in">
            <div class="inline-flex items-center gap-2 bg-white/10 border border-white/20 rounded-full px-4 py-1.5 text-red-500 text-sm mb-4 backdrop-blur-sm">
                Politeknik Semen Indonesia — PKKMB 2025
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-white leading-tight">
                Portal Pengumuman
                <span class="block text-transparent bg-clip-text bg-red-500">PKKMB 2026</span>
            </h1>
            <p class="mt-3 text-red-600 text-base max-w-md mx-auto">Cek pengumuman panitia PKKMB</p>
        </div>
    </header>

    <!-- Search Section -->
    <main class="max-w-2xl mx-auto px-6 pb-16">
        <div class="fade-in bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-6 shadow-2xl">
            <label class="block text-red-500 font-semibold mb-2 text-sm uppercase tracking-wider">Nama / Email</label>
            <div class="flex gap-3">
                <input
                    id="inputNama"
                    type="text"
                    placeholder="Masukkan Nama / Email"
                    class="flex-1 bg-gray-100 border border-red text-red-500 placeholder-red-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition"
                />
                <button
                    onclick="checkAnnouncement()"
                    class="bg-red-500 hover:from-red-400 hover:to-indigo-400 text-white font-bold px-6 py-3 rounded-xl text-sm transition-all active:scale-95 shadow-red-500/30 cursor-pointer"
                >
                    CEK
                </button>
            </div>

            <!-- Result -->
        </div>
        <div id="result" class="hidden mt-5"></div>

    </main>

    <script>
        function renderResult(data) {
            const result = document.getElementById('result');
            const isDiterima = data.status === 'diterima';
            const headerBg = isDiterima ? 'bg-blue-600' : 'bg-red-600';
            const judulStatus = isDiterima ? 'SELAMAT!' : 'TERIMA KASIH!';
            const pesanStatus = isDiterima
                ? 'Kami dengan bangga menerima kamu menjadi bagian dari PKKMB 2025. Selamat bergabung!'
                : 'Mohon maaf saat ini kami belum bisa menerima kamu menjadi Panitia PKKMB 2025. Terimakasih atas antusiasnya dan semoga kita dapat bekerjasama di lain waktu!';

            result.className = 'mt-5 bg-white rounded-2xl overflow-hidden shadow-xl border border-gray-200 text-sm';
            result.innerHTML =
                '<div class="' + headerBg + ' px-6 py-5 flex justify-between items-start">' +
                    '<div class="text-white max-w-xs">' +
                        '<p class="text-2xl font-black tracking-wide">' + judulStatus + '</p>' +
                        '<p class="mt-1 text-sm leading-relaxed opacity-90">' + pesanStatus + '</p>' +
                    '</div>' +
                    '<div class="text-right text-white shrink-0 ml-4">' +
                        '<img src="logo.png" class="w-20" alt="Logo PKKMB 2025">' +
                    '</div>' +
                '</div>' +
                '<div class="px-6 py-5 grid grid-cols-2 gap-x-8 gap-y-4 text-gray-700">' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Nama:</p><p class="font-bold text-red-600">' + data.nama + '</p></div>' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Nomer Handphone:</p><p class="font-bold text-red-600">' + data.noHp + '</p></div>' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Posisi:</p><p class="font-bold text-red-600">' + data.posisi + '</p></div>' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Email:</p><p class="font-bold text-red-600">' + data.email + '</p></div>' +
                '</div>';
            result.classList.remove('hidden');
        }

        async function checkAnnouncement() {
            const query = document.getElementById('inputNama').value.trim();
            const result = document.getElementById('result');

            if (!query) {
                result.className = 'mt-5 bg-yellow-500/20 border border-yellow-400/40 rounded-xl p-4 text-yellow-500 text-sm text-center';
                result.textContent = 'Masukkan nama atau email terlebih dahulu.';
                result.classList.remove('hidden');
                return;
            }

            result.className = 'mt-5 text-center text-gray-400 text-sm py-4';
            result.textContent = 'Mencari data...';
            result.classList.remove('hidden');

            try {
                const API_URL = document.querySelector('meta[name="api-url"]')?.content || 'http://localhost:3000';
            const res = await fetch(API_URL + '/api/peserta?' + new URLSearchParams({ nama: query, email: query }));
                if (!res.ok) {
                    result.className = 'mt-5 bg-yellow-500/20 border border-yellow-400/40 rounded-xl p-4 text-yellow-600 text-sm text-center';
                    result.textContent = 'Data untuk "' + query + '" tidak ditemukan.';
                    return;
                }
                const data = await res.json();
                renderResult(data);
            } catch (err) {
                result.className = 'mt-5 bg-red-100 border border-red-300 rounded-xl p-4 text-red-600 text-sm text-center';
                result.textContent = 'Gagal terhubung ke server. Pastikan server sudah berjalan.';
            }
        }

        document.getElementById('inputNama').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAnnouncement();
        });
    </script>
</body>
</html>
