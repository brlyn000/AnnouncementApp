<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-url" content="https://announcement-app-six.vercel.app">
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Pengumuman PKKMB</title>
    <style>
        :root {
            --pink: #FF5EBF;
            --blue: #1B52A6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
        .card-appear { animation: cardAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .btn-cek { background-color: #FF5EBF; }
        .btn-cek:hover { background-color: #e04daa; }
        .label-color { color: #FF5EBF; }
        .badge { border-color: rgba(255,255,255,0.3); color: #ffd6f0; }
        .card-glass { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .value-color { color: #1B52A6; }
        .header-diterima { background-color: #1B52A6; }
        .header-ditolak { background-color: #FF5EBF; }
        .header-undangan { background: linear-gradient(135deg, #1B52A6, #FF5EBF); }
    </style>
</head>
<body class="min-h-screen font-sans">

    <!-- Header -->
    <header class="relative overflow-hidden py-12 px-6 text-center">
        <div class="relative z-10 fade-in">
            <div style="color:#1B52A6" class="inline-flex items-center gap-2 badge border rounded-full px-4 py-1.5 text-sm mb-4 backdrop-blur-sm">
                Politeknik Semen Indonesia — PKKMB 2026
            </div>
            <div class="flex items-center justify-center gap-10 text-center mb-8">
                <img class="w-28 sm:w-48" src="polteksi.png" alt="logo-polteksi">
                <img class="w-28 sm:w-48" src="logo.png" alt="logo-orvoks">
            </div>
            <h1 style="color:#1B52A6" class="text-3xl md:text-5xl font-extrabold text-white leading-tight">
                Portal Pengumuman
                <span class="block" style="color: #FF5EBF;">Panitia PKKMB - ORVOKS 2026</span>
            </h1>
            <p style="color: #FF5EBF;" text-base max-w-md mx-auto">Cek pengumuman kelulusan</p>
        </div>
    </header>

    <!-- Search Section -->
    <main class="max-w-2xl mx-auto px-6 pb-16">
        <div class="fade-in card-glass backdrop-blur-md rounded-2xl p-6 shadow-2xl">
            <label class="block label-color font-semibold mb-2 text-sm uppercase tracking-wider">Nama Lengkap / Nomor HP</label>
            <div class="flex gap-3">
                <input
                    id="inputNama"
                    type="text"
                    placeholder="Masukkan Nama Legkap / Nomor HP"
                    class="flex-1 bg-white/90 text-pink-500 placeholder-gray-400 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 transition"
                    style="focus-ring-color: #FF5EBF;"
                />
                <button
                    onclick="checkAnnouncement()"
                    class="btn-cek text-white font-bold px-6 py-3 rounded-xl text-sm transition-all active:scale-95 cursor-pointer"
                >
                    CEK
                </button>
            </div>
        </div>
        <div id="result" class="hidden mt-5"></div>
        <div id="loading" class="hidden mt-5 flex justify-center items-center">
            <video src="loading-logo.webm" autoplay loop muted playsinline class="w-48"></video>
        </div>
    </main>

    <script>
        function renderResult(data) {
            const result = document.getElementById('result');

            const statusMap = {
                diterima: {
                    headerClass: 'header-diterima',
                    judul: 'SELAMAT!',
                    pesan: 'Kami dengan bangga menerima kamu menjadi panitia PKKMB - ORVOKS Polteksi 2026. Selamat bergabung!'
                },
                ditolak: {
                    headerClass: 'header-ditolak',
                    judul: 'TERIMA KASIH!',
                    pesan: 'Mohon maaf saat ini kami belum bisa menerima kamu menjadi Panitia PKKMB -ORVOKS Polteksi 2026. Terimakasih, Semoga kita dapat bekerjasama di lain waktu!'
                },
                undangan: {
                    headerClass: 'header-undangan',
                    judul: 'KAMU DIUNDANG!',
                    pesan: 'Kamu mendapatkan undangan khusus untuk menjadi Panitia PKKMB - ORVOKS Polteksi 2026. Selamat bergabung!'
                }
            };

            const s = statusMap[data.status] || statusMap.ditolak;
            const emailText = data.email || '-';
            const noHpText = data.noHp || '-';

            const gabungBtn = (data.status === 'diterima' || data.status === 'undangan')
                ? '<div class="px-6 pb-5">' +
                    '<a href="https://chat.whatsapp.com/KlwhQWN9evJFkv4anxN5cT?s=cl&p=a&ilr=0" target="_blank" ' +
                    'class="flex items-center justify-center gap-2 w-full py-3 rounded-xl text-white font-bold text-sm transition-all active:scale-95" ' +
                    'style="background-color: #25D366;">' +
                    '💬 Gabung Grup WhatsApp' +
                    '</a>' +
                  '</div>'
                : '';

            result.className = 'mt-5 bg-white rounded-2xl overflow-hidden shadow-xl border border-gray-200 text-sm card-appear';
            result.innerHTML =
                '<div class="' + s.headerClass + ' px-4 py-4 flex justify-between items-start">' +
                    '<div class="text-white max-w-xs">' +
                        '<p class="text-lg font-black tracking-wide">' + s.judul + '</p>' +
                        '<p class="mt-1 text-xs leading-relaxed opacity-90">' + s.pesan + '</p>' +
                    '</div>' +
                    '<div class="text-white shrink-0 ml-3 flex items-center">' +
                        '<img src="white-logo.png" class="w-26" alt="Logo PKKMB 2026">' +
                    '</div>' +
                '</div>' +
                '<div class="px-4 py-4 grid grid-cols-2 gap-x-4 gap-y-3 text-gray-700">' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Nama:</p><p class="font-bold text-xs value-color break-words">' + data.nama + '</p></div>' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Nomor HP:</p><p class="font-bold text-xs value-color">' + noHpText + '</p></div>' +
                    '<div><p class="text-gray-400 text-xs mb-0.5">Posisi:</p><p class="font-bold text-xs value-color break-words">' + data.posisi + '</p></div>' +
                '</div>' +
                gabungBtn;
            result.classList.remove('hidden');
        }

        async function checkAnnouncement() {
            const query = document.getElementById('inputNama').value.trim();
            const result = document.getElementById('result');
            const loading = document.getElementById('loading');

            if (!query) {
                result.className = 'mt-5 rounded-xl p-4 text-sm text-center';
                result.style.background = 'rgba(255,94,191,0.15)';
                result.style.border = '1px solid rgba(255,94,191,0.4)';
                result.style.color = '#FF5EBF';
                result.textContent = 'Masukkan nama atau nomor HP terlebih dahulu.';
                result.classList.remove('hidden');
                return;
            }

            result.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const API_URL = document.querySelector('meta[name="api-url"]')?.content || 'http://localhost:3000';
                const [res] = await Promise.all([
                    fetch(API_URL + '/api/peserta?' + new URLSearchParams({ nama: query, noHp: query })),
                    new Promise(resolve => setTimeout(resolve, 3000))
                ]);

                loading.classList.add('hidden');

                if (!res.ok) {
                    result.className = 'mt-5 rounded-xl p-4 text-sm text-center';
                    result.style.background = 'rgba(255,94,191,0.15)';
                    result.style.border = '1px solid rgba(255,94,191,0.4)';
                    result.style.color = '#FF5EBF';
                    result.textContent = 'Mungkin kamu belum mendaftar atau nama dan nomor HP salah.';
                    result.classList.remove('hidden');
                    return;
                }
                const data = await res.json();
                result.style = '';
                renderResult(data);
            } catch (err) {
                loading.classList.add('hidden');
                result.className = 'mt-5 rounded-xl p-4 text-sm text-center';
                result.style.background = 'rgba(27,82,166,0.15)';
                result.style.border = '1px solid rgba(27,82,166,0.4)';
                result.style.color = '#1B52A6';
                result.textContent = 'Gagal terhubung ke server. Pastikan server sudah berjalan.';
                result.classList.remove('hidden');
            }
        }

        document.getElementById('inputNama').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAnnouncement();
        });
    </script>
</body>
</html>
